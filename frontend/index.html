<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1d0f19">
  <title>Lilian's Garden</title>
  <link rel="stylesheet" href="./css/home.css">
</head>
<body>
  <main class="home-page">
    <section class="hero-section" aria-labelledby="homeTitle">
      <div class="home-backdrop" aria-hidden="true"></div>
      <div class="home-overlay" aria-hidden="true"></div>
      <div class="hero-content">
        <h1 id="homeTitle">Lilian's Garden</h1>
        <button class="garden-button" type="button" data-scroll-target="#roles">Visit</button>
      </div>
    </section>

    <section class="roster-section" id="roles" aria-labelledby="rosterTitle">
      <div class="home-backdrop" aria-hidden="true"></div>
      <div class="home-overlay roster-overlay" aria-hidden="true"></div>
      <div class="roster-content">
        <h2 id="rosterTitle">莉莉安名册</h2>

        <div class="character-grid" aria-label="角色选择">
          <article class="character-card" data-character-id="sakiko">
            <div class="character-image">
              <img src="./assets/avatars/sakiko.jpg" alt="丰川祥子">
            </div>
            <div class="character-name">丰川祥子</div>
          </article>

          <article class="character-card is-placeholder" data-character-id="shion">
            <div class="character-image" aria-hidden="true">
              <span>Hydrangea</span>
            </div>
            <div class="character-name">濑名紫阳花</div>
          </article>
        </div>
      </div>
    </section>
  </main>

  <script src="./js/home.js"></script>
</body>
</html>
